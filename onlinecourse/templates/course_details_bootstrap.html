<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ course.name }} - Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">{{ course.name }}</h1>
    <p>{{ course.description }}</p>

    <h2 class="mt-5">Lessons</h2>
    <div class="list-group">
        {% for lesson in course.lessons.all %}
            <a href="{% url 'lesson_detail' lesson.id %}" class="list-group-item list-group-item-action">
                {{ lesson.title }}
            </a>
        {% empty %}
            <p class="text-muted">No lessons available for this course.</p>
        {% endfor %}
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
